input {
  beats {
    port => 5044
  }
}

filter {

  # ── Skip grok for pre-parsed alert JSON ──────────────────────────────────────
  if [log_type] == "alert" {
    mutate { remove_field => ["host", "agent", "ecs", "input", "message"] }
  }

  else {

  # ── BASE PARSE ───────────────────────────────────────────────────────────────
  # Two formats from logg_gen.py:
  #
  # WITH pid:    2026 Apr 04 19:38:05 server systemd-logind[10008]: New session...
  # WITHOUT pid: 2026 Apr 04 19:38:18 server sudo: pam_unix(sudo:session):...
  #
  # Key: use [^\[\s]+ for service so hyphen is captured, \[ stops it at the bracket

  grok {
    match => { "message" => [
      "^%{YEAR:log_year} %{MONTH:log_month} %{MONTHDAY:log_day} %{TIME:log_time} %{HOSTNAME:server} (?<service>[^\[\s]+)\[%{NUMBER:pid}\]: %{GREEDYDATA:log_message}$",
      "^%{YEAR:log_year} %{MONTH:log_month} %{MONTHDAY:log_day} %{TIME:log_time} %{HOSTNAME:server} (?<service>[^\[\s:]+): %{GREEDYDATA:log_message}$"
    ]}
    tag_on_failure => ["_grok_base_failure"]
  }

  if "_grok_base_failure" in [tags] {
    mutate {
      add_field => { "event_type" => "unparsed" "severity" => "info" }
    }
  }

  else {

    # ── 1. Accepted password ───────────────────────────────────────────────────
    if [log_message] =~ /^Accepted password for / {
      grok {
        match => { "log_message" => "^Accepted password for %{WORD:username} from %{IP:src_ip} port %{NUMBER:src_port} ssh2$" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "accepted_password"  "auth_method" => "password"  "login_result" => "success"  "severity" => "info" } }
    }

    # ── 2. Accepted publickey ─────────────────────────────────────────────────
    else if [log_message] =~ /^Accepted publickey for / {
      grok {
        match => { "log_message" => "^Accepted publickey for %{WORD:username} from %{IP:src_ip} port %{NUMBER:src_port} ssh2: %{WORD:key_type} SHA256:%{GREEDYDATA:key_fingerprint}$" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "accepted_publickey"  "auth_method" => "publickey"  "login_result" => "success"  "severity" => "info" } }
    }

    # ── 3. Failed password — invalid user ─────────────────────────────────────
    else if [log_message] =~ /^Failed password for invalid user / {
      grok {
        match => { "log_message" => "^Failed password for invalid user %{WORD:username} from %{IP:src_ip} port %{NUMBER:src_port} ssh2$" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "failed_password"  "user_validity" => "invalid"  "login_result" => "failure"  "severity" => "warning" } }
    }

    # ── 4. Failed password — valid user ───────────────────────────────────────
    else if [log_message] =~ /^Failed password for / {
      grok {
        match => { "log_message" => "^Failed password for %{WORD:username} from %{IP:src_ip} port %{NUMBER:src_port} ssh2$" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "failed_password"  "user_validity" => "valid"  "login_result" => "failure"  "severity" => "high" } }
    }

    # ── 5. Max auth attempts exceeded ─────────────────────────────────────────
    else if [log_message] =~ /maximum authentication attempts exceeded/ {
      grok {
        match => { "log_message" => "error: maximum authentication attempts exceeded for invalid user %{WORD:username} from %{IP:src_ip} port %{NUMBER:src_port}" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "max_auth_exceeded"  "severity" => "high" } }
    }

    # ── 6. PAM failures ───────────────────────────────────────────────────────
    else if [log_message] =~ /^PAM .* more authentication failure/ {
      grok {
        match => { "log_message" => "PAM %{NUMBER:pam_failures} more authentication failure%{GREEDYDATA}rhost=%{IP:src_ip}%{GREEDYDATA}user=%{WORD:username}" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "pam_failure"  "severity" => "warning" } }
    }

    # ── 7. Disconnected from invalid user [preauth] ───────────────────────────
    else if [log_message] =~ /^Disconnected from invalid user / {
      grok {
        match => { "log_message" => "^Disconnected from invalid user %{WORD:username} %{IP:src_ip} port %{NUMBER:src_port}" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "preauth_disconnect"  "severity" => "warning" } }
    }

    # ── 8. Disconnected from valid user ───────────────────────────────────────
    else if [log_message] =~ /^Disconnected from user / {
      grok {
        match => { "log_message" => "^Disconnected from user %{WORD:username} %{IP:src_ip} port %{NUMBER:src_port}" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "session_disconnect"  "severity" => "info" } }
    }

    # ── 9. Connection closed ──────────────────────────────────────────────────
    else if [log_message] =~ /^Connection closed by / {
      grok {
        match => { "log_message" => "^Connection closed by %{IP:src_ip} port %{NUMBER:src_port}" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "connection_closed"  "severity" => "info" } }
    }

    # ── 10. sudo session ──────────────────────────────────────────────────────
    else if [log_message] =~ /pam_unix\(sudo:session\)/ {
      grok {
        match => { "log_message" => "pam_unix\(sudo:session\): session %{WORD:sudo_action} for user %{WORD:target_user} by %{WORD:username}" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "sudo_session"  "severity" => "info" } }
    }

    # ── 11. New session ───────────────────────────────────────────────────────
    else if [log_message] =~ /^New session for user / {
      grok {
        match => { "log_message" => "^New session for user %{WORD:username}" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "session_opened"  "severity" => "info" } }
    }

    # ── 12. Session removed ───────────────────────────────────────────────────
    else if [log_message] =~ /^Session removed for user / {
      grok {
        match => { "log_message" => "^Session removed for user %{WORD:username}" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "session_closed"  "severity" => "info" } }
    }

    # ── 13. CRON ──────────────────────────────────────────────────────────────
    else if [service] == "CRON" {
      grok {
        match => { "log_message" => "^\(%{WORD:username}\) CMD \(%{GREEDYDATA:cron_cmd}\)" }
        tag_on_failure => ["_grok_msg_failure"]
      }
      mutate { add_field => { "event_type" => "cron_job"  "severity" => "info" } }
    }

    # ── 14. Anything else ─────────────────────────────────────────────────────
    else {
      mutate { add_field => { "event_type" => "other"  "severity" => "info" } }
    }

  }

  # ── ENRICHMENT ───────────────────────────────────────────────────────────────
  if [username] == "root" and [event_type] in ["accepted_password", "accepted_publickey"] {
    mutate { update => { "severity" => "critical" }  add_tag => ["root_login"] }
  }

  # ── TIMESTAMP ─────────────────────────────────────────────────────────────────
  mutate {
    add_field => { "log_timestamp" => "%{log_year} %{log_month} %{log_day} %{log_time}" }
  }
  date {
    match => ["log_timestamp", "yyyy MMM dd HH:mm:ss"]
    target => "@timestamp"
    timezone => "Asia/Kolkata"
  }

  # ── CONVERSIONS ───────────────────────────────────────────────────────────────
  mutate {
    convert => { "src_port"     => "integer" }
    convert => { "pid"          => "integer" }
    convert => { "pam_failures" => "integer" }
  }

  # ── CLEANUP ───────────────────────────────────────────────────────────────────
  mutate {
    remove_field => ["log_year", "log_month", "log_day", "log_time", "log_timestamp", "log_message", "host", "agent", "ecs", "input"]
  }

  } # end else (non-alert)

}

output {
  if [log_type] == "alert" {
    elasticsearch {
      hosts  => ["http://elasticsearch:9200"]
      index  => "siem-alerts-final"
      action => "index"
    }
  } else {
    elasticsearch {
      hosts  => ["http://elasticsearch:9200"]
      index  => "siem-logs-final"
      action => "index"
    }
  }

  stdout { codec => rubydebug }
}
